<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль: {{ user.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Профиль пользователя: {{ user.name }}</h2>
        <a href="/users" class="btn btn-secondary mb-3">Назад к списку</a>

        <div class="row">
            <div class="col-md-6">
                <h4>Подписки на валюты</h4>
                {% if subscriptions %}
                    <ul class="list-group mb-3">
                        {% for sub in subscriptions %}
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                {{ sub.name }} ({{ sub.char_code }})
                                <span class="badge bg-primary rounded-pill">{{ sub.value }}</span>
                            </li>
                        {% endfor %}
                    </ul>
                {% else %}
                    <p class="text-muted">Нет активных подписок.</p>
                {% endif %}
            </div>

            <div class="col-md-6">
                <h4>Добавить подписку</h4>
                <form action="/user" method="GET">
                    <input type="hidden" name="id" value="{{ user.id }}">
                    <div class="input-group mb-3">
                        <select name="add_currency_id" class="form-select">
                            <option selected disabled>Выберите валюту</option>
                            {% for curr in all_currencies %}
                                <option value="{{ curr.id }}">{{ curr.char_code }} - {{ curr.name }}</option>
                            {% endfor %}
                        </select>
                        <button class="btn btn-outline-primary" type="submit">Подписаться</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
