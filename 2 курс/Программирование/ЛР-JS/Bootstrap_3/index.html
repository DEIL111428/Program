<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Узнать время</title>
  </head>
<body>

  <div class="container text-center">
    <div class="row">
      <div class="col-2"></div>
      <div class="col-8">
        <button type="button" class="btn btn-danger btn-lg w-100 mt-5" data-bs-toggle="modal"
          data-bs-target="#timeModal">
          Показать время
        </button>

        <div class="modal fade" id="timeModal" data-bs-backdrop="static" data-bs-keyboard="false"
          tabindex="-1" aria-labelledby="timeModalLabel" aria-hidden="true">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="timeModalLabel">Иванов Федор</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <p id="currentDateTime">Загрузка...</p>
              </div>
              <div class="modal-footer d-flex justify-content-end">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-2"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
