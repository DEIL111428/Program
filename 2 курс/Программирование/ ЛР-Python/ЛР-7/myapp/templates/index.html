<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ myapp }} - Главная</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Добро пожаловать в {{ myapp }}</h1>
        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title">О приложении</h5>
                <p class="card-text">Автор: {{ author_name }}</p>
                <p class="card-text">Версия: {{ version }}</p>
                <p class="card-text">Группа: {{ group }}</p>
            </div>
        </div>

        <h3 class="mt-4">Меню</h3>
        <div class="list-group">
            {% for nav in navigation %}
                <a href="{{ nav.href }}" class="list-group-item list-group-item-action">{{ nav.caption }}</a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
