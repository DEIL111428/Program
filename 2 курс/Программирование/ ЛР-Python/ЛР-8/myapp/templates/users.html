<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пользователи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Список пользователей</h2>
        <a href="/" class="btn btn-secondary mb-3">Назад</a>

        <!-- Форма добавления пользователя -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Добавить нового пользователя</h5>
                <form action="/users" method="POST" class="row g-3">
                    <div class="col-auto">
                        <input type="text" class="form-control" name="name" placeholder="Имя пользователя" required>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-success">Добавить</button>
                    </div>
                </form>
            </div>
        </div>
        
        <ul class="list-group">
        {% for user in users %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ user.name }} (ID: {{ user.id }})
                <a href="/user?id={{ user.id }}" class="btn btn-primary btn-sm">Профиль</a>
            </li>
        {% endfor %}
        </ul>
    </div>
</body>
</html>
